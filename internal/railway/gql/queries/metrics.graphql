query metrics(
  $environmentId: String,
  $serviceId: String,
  $startDate: DateTime!,
  $endDate: DateTime,
  $measurements: [MetricMeasurement!]!
) {
  metrics(
    environmentId: $environmentId
    serviceId: $serviceId

    measurements: $measurements

    startDate: $startDate
    endDate: $endDate

    groupBy: ["DEPLOYMENT_INSTANCE_ID"]
  ) {
    measurement
    tags
    values
  }
}